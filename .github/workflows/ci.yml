name: Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-test:
    name: Rust lint and test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            clang \
            cmake \
            libssl-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libdbus-1-dev \
            libudev-dev \
            libgtk-3-dev \
            libgtk-4-dev \
            meson \
            ninja-build \
            wayland-protocols \
            libpango1.0-dev \
            libcairo2-dev \
            libpixman-1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb-render0-dev \
            libxcb-randr0-dev \
            libxcb1-dev \
            libx11-dev

      - name: Build gtk4-layer-shell
        # Ubuntu 24.04 (the current runner) has no libgtk4-layer-shell-dev
        # package; build the pinned release from source for the GTK toolbars.
        run: bash tools/install-gtk4-layer-shell.sh

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy, rustfmt

      - name: Cache cargo builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .

      - name: Check version metadata
        run: bash tools/check-version-consistency.sh

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test (all features)
        run: cargo test --workspace --all-features

      - name: cargo test (no default features)
        run: cargo test --workspace --no-default-features

  nix-flake:
    name: Nix flake
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check flake package versions
        run: |
          cargo_version="$(awk -F'"' '/^version = / { print $2; exit }' Cargo.toml)"
          wayscriber_version="$(nix eval .#packages.x86_64-linux.wayscriber.version --raw)"
          configurator_version="$(nix eval .#packages.x86_64-linux.wayscriber-configurator.version --raw)"

          test "$wayscriber_version" = "$cargo_version"
          test "$configurator_version" = "$cargo_version"

      - name: Check flake package instantiation
        run: nix build .#wayscriber .#wayscriber-configurator --no-link --dry-run
